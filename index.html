<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funksjonsfabrikken 🏭</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f39c12;
            --success: #27ae60;
            --bg: #2f3640;
            --panel: #353b48;
            --text: #f5f6fa;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Startskjerm */
        #start-screen {
            text-align: center;
            background: var(--panel);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid var(--accent);
            max-width: 500px;
        }

        .level-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 1.2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .level-btn:hover { transform: scale(1.05); background: #e67e22; }

        /* Spillskjerm */
        #game-screen {
            display: none;
            width: 95%;
            max-width: 900px;
            background: var(--panel);
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }

        .instructions {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            border-left: 4px solid var(--accent);
        }

        .factory-layout {
            display: grid;
            grid-template-columns: 150px 1fr 200px;
            gap: 20px;
            align-items: center;
        }

        /* Keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .num-btn {
            padding: 15px;
            background: #7f8c8d;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px #444;
        }

        .num-btn:active { box-shadow: 0 0; transform: translateY(4px); }

        /* Maskinen */
        .machine-core {
            height: 180px;
            background: #1e272e;
            border: 8px solid #485460;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ball {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            position: absolute;
            left: -60px;
            z-index: 10;
        }

        .output-zone {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
        }

        .guess-box {
            grid-column: span 3;
            margin-top: 20px;
            padding: 20px;
            border-top: 2px solid #555;
            text-align: center;
        }

        input[type="text"] {
            padding: 12px;
            width: 180px;
            border-radius: 5px;
            border: none;
            font-size: 1rem;
        }

        .hint-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }

        .hint-text {
            display: block;
            margin-top: 10px;
            color: #3498db;
            font-style: italic;
            min-height: 20px;
        }

        .working { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>🏭 FUNKSJONS-FABRIKKEN</h1>
        <p><strong>Slik spiller du:</strong></p>
        <ul style="text-align: left; font-size: 0.9rem;">
            <li>1. Send tall inn i maskinen ved å trykke på knappene.</li>
            <li>2. Se hvilket tall som kommer ut på høyre side.</li>
            <li>3. Finn mønsteret og skriv inn funksjonen (f.eks. x + 2).</li>
        </ul>
        <button class="level-btn" onclick="startGame(1)">Nivå 1: Barneskole</button>
        <button class="level-btn" onclick="startGame(2)">Nivå 2: Ungdomsskole</button>
        <button class="level-btn" onclick="startGame(3)">Nivå 3: VGS</button>
    </div>

    <div id="game-screen">
        <div class="instructions">
            💡 <strong>Oppgave:</strong> Finn ut hva maskinen gjør med <em>x</em> for å få <em>y</em>.
        </div>

        <div class="factory-layout">
            <div class="keypad" id="keypad">
                <button class="num-btn" onclick="runFactory(1)">1</button>
                <button class="num-btn" onclick="runFactory(2)">2</button>
                <button class="num-btn" onclick="runFactory(3)">3</button>
                <button class="num-btn" onclick="runFactory(4)">4</button>
                <button class="num-btn" onclick="runFactory(5)">5</button>
                <button class="num-btn" onclick="runFactory(0)">0</button>
            </div>

            <div class="machine-core" id="machine">
                <div class="ball" id="ball"></div>
                <div style="color: #444; font-weight: bold;">FABRIKK-MODUL</div>
            </div>

            <div class="output-zone" id="log">
                <div style="font-size:0.7rem; color:#888; margin-bottom:10px;">HISTORIKK (x ➔ y)</div>
            </div>

            <div class="guess-box">
                <input type="text" id="guessInput" placeholder="Svar: x + 5">
                <button onclick="checkGuess()" style="padding:12px 20px; background:var(--success); border:none; color:white; border-radius:5px; cursor:pointer; font-weight:bold;">SJEKK</button>
                <button class="hint-btn" onclick="showHint()">HINT?</button>
                <span id="hintDisplay" class="hint-text"></span>
                <p id="feedback" style="margin-top:15px; font-weight:bold;"></p>
            </div>
        </div>
        
        <div style="text-align:center; margin-top:20px;">
            <button onclick="location.reload()" style="background:none; border:none; color:#7f8c8d; text-decoration:underline; cursor:pointer;">Bytt nivå</button>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let currentFunc = {};
        let isProcessing = false;
        let hintsShown = 0;

        function startGame(lvl) {
            currentLevel = lvl;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            generateNewFunction();
        }

        function generateNewFunction() {
            const n = Math.floor(Math.random() * 9) + 1;
            const a = Math.floor(Math.random() * 4) + 2;
            hintsShown = 0;
            document.getElementById('hintDisplay').innerText = "";
            
            if (currentLevel === 1) {
                const op = Math.random() > 0.5 ? '+' : '-';
                currentFunc = { 
                    calc: (x) => op === '+' ? x + n : x - n, 
                    ans: `x${op}${n}`,
                    hint: `Maskinen bruker ${op === '+' ? 'addisjon' : 'subtraksjon'}.`
                };
            } else if (currentLevel === 2) {
                const type = Math.floor(Math.random() * 3);
                if (type === 0) {
                    const op = Math.random() > 0.5 ? '+' : '-';
                    currentFunc = { calc: (x) => op === '+' ? x + n : x - n, ans: `x${op}${n}`, hint: "Det er en enkel pluss eller minus." };
                } else if (type === 1) {
                    currentFunc = { calc: (x) => a * x, ans: `${a}x`, hint: `Tallet ganges med noe.` };
                } else {
                    currentFunc = { calc: (x) => a * x + n, ans: `${a}x+${n}`, hint: `Først ganges x med ${a}, så skjer det noe mer...` };
                }
            } else {
                currentFunc = { 
                    calc: (x) => Math.pow(x, 2) + n, 
                    ans: `x^2+${n}`,
                    hint: "Tallet opphøyes i andre potens (kvadreres)."
                };
            }
            currentFunc.ans = currentFunc.ans.replace("+-", "-").replace("--", "+");
        }

        function showHint() {
            const display = document.getElementById('hintDisplay');
            if (hintsShown === 0) {
                display.innerText = "Hint: " + currentFunc.hint;
            } else {
                display.innerText = "Svaret starter med: " + currentFunc.ans.substring(0, 2) + "...";
            }
            hintsShown++;
        }

        function runFactory(val) {
            if (isProcessing) return;
            isProcessing = true;
            
            const ball = document.getElementById('ball');
            const machine = document.getElementById('machine');
            
            ball.innerText = val;
            ball.style.transition = 'none';
            ball.style.left = '-60px';
            ball.style.opacity = '1';
            machine.classList.add('working');

            setTimeout(() => {
                ball.style.transition = '1s cubic-bezier(0.45, 0.05, 0.55, 0.95)';
                ball.style.left = '45%';
            }, 50);

            setTimeout(() => {
                const result = currentFunc.calc(val);
                ball.innerText = result;
                ball.style.left = '110%';
                addToLog(val, result);
                machine.classList.remove('working');
            }, 1100);

            setTimeout(() => {
                ball.style.opacity = '0';
                isProcessing = false;
            }, 2100);
        }

        function addToLog(x, y) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.style.padding = "8px";
            entry.style.borderBottom = "1px solid #444";
            entry.innerHTML = `Input: <strong>${x}</strong> ➔ Resultat: <strong style="color:var(--accent)">${y}</strong>`;
            log.insertBefore(entry, log.firstChild.nextSibling);
        }

        function checkGuess() {
            const guess = document.getElementById('guessInput').value.replace(/\s+/g, '').toLowerCase();
            const correct = currentFunc.ans.toLowerCase();
            const feedback = document.getElementById('feedback');

            if (guess === correct || guess === "f(x)=" + correct) {
                feedback.innerHTML = "<span style='color:var(--success)'>⭐ RIKTIG! Genererer ny maskin...</span>";
                setTimeout(() => {
                    document.getElementById('log').innerHTML = '<div style="font-size:0.7rem; color:#888; margin-bottom:10px;">HISTORIKK (x ➔ y)</div>';
                    document.getElementById('guessInput').value = '';
                    feedback.innerText = '';
                    generateNewFunction();
                }, 2000);
            } else {
                feedback.innerHTML = "<span style='color:#e74c3c'>Prøv igjen! Bruk loggen til å se mønsteret.</span>";
            }
        }
    </script>
</body>
</html>
