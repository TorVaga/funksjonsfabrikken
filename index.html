<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funksjonsfabrikken 🏭</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f39c12;
            --success: #27ae60;
            --bg: #2f3640;
            --panel: #353b48;
            --text: #f5f6fa;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Startskjerm */
        #start-screen {
            text-align: center;
            background: var(--panel);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 4px solid var(--accent);
        }

        .level-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 1.2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .level-btn:hover { transform: scale(1.05); background: #e67e22; }

        /* Spillskjerm */
        #game-screen {
            display: none;
            width: 95%;
            max-width: 900px;
            background: var(--panel);
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }

        .factory-layout {
            display: grid;
            grid-template-columns: 150px 1fr 200px;
            gap: 20px;
            align-items: center;
        }

        /* Siffer-knapper (Keypad) */
        .keypad {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .num-btn {
            padding: 15px;
            background: #7f8c8d;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 4px #444;
        }

        .num-btn:active { box-shadow: 0 0; transform: translateY(4px); }

        /* Maskinen */
        .machine-core {
            height: 200px;
            background: #1e272e;
            border: 8px solid #485460;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .conveyor-belt {
            position: absolute;
            bottom: 20px;
            width: 100%;
            height: 10px;
            background: repeating-linear-gradient(90deg, #111, #111 20px, #333 20px, #333 40px);
            animation: moveBelt 1s linear infinite;
            animation-play-state: paused;
        }

        @keyframes moveBelt { from { background-position: 0 0; } to { background-position: 40px 0; } }

        .ball {
            width: 50px;
            height: 50px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            position: absolute;
            left: -60px;
            transition: 1s cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        /* Logg og svar */
        .output-zone {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
        }

        .guess-box {
            grid-column: span 3;
            margin-top: 20px;
            padding: 20px;
            border-top: 2px solid #555;
        }

        input[type="text"] {
            padding: 10px;
            width: 200px;
            border-radius: 5px;
            border: none;
        }

        .status-light {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #c0392b;
            margin: 0 auto 10px;
        }

        .working .status-light { background: #27ae60; box-shadow: 0 0 10px #27ae60; }
        .working .conveyor-belt { animation-play-state: running; }

    </style>
</head>
<body>

    <div id="start-screen">
        <h1>🏭 FUNKSJONS-FABRIKKEN</h1>
        <p>Velg ditt vanskelighetsnivå:</p>
        <button class="level-btn" onclick="startGame(1)">Nivå 1: Barneskole (+/-)</button>
        <button class="level-btn" onclick="startGame(2)">Nivå 2: Ungdomsskole (ax + b)</button>
        <button class="level-btn" onclick="startGame(3)">Nivå 3: VGS (x² og mer)</button>
    </div>

    <div id="game-screen">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="location.reload()" style="background:none; color:#aaa; border:1px solid #aaa; cursor:pointer;">Tilbake</button>
            <h2 id="levelDisplay">Nivå</h2>
            <div id="score">Riktige: 0</div>
        </div>

        <div class="factory-layout">
            <div class="keypad">
                <button class="num-btn" onclick="runFactory(1)">1</button>
                <button class="num-btn" onclick="runFactory(2)">2</button>
                <button class="num-btn" onclick="runFactory(3)">3</button>
                <button class="num-btn" onclick="runFactory(4)">4</button>
                <button class="num-btn" onclick="runFactory(5)">5</button>
                <button class="num-btn" onclick="runFactory(6)">6</button>
                <button class="num-btn" onclick="runFactory(7)">7</button>
                <button class="num-btn" onclick="runFactory(8)">8</button>
                <button class="num-btn" onclick="runFactory(9)">9</button>
                <button class="num-btn" onclick="runFactory(0)">0</button>
            </div>

            <div class="machine-core" id="machine">
                <div class="status-light"></div>
                <div id="machineLabel" style="font-size: 0.8rem; color: #555;">SISTEM OK</div>
                <div class="ball" id="ball"></div>
                <div class="conveyor-belt"></div>
            </div>

            <div class="output-zone" id="log">
                <div style="font-size:0.8rem; border-bottom:1px solid #555; margin-bottom:10px;">HISTORIKK (X ➜ Y)</div>
            </div>

            <div class="guess-box">
                <h3>Hva er funksjonen?</h3>
                <input type="text" id="guessInput" placeholder="f.eks. x + 3">
                <button onclick="checkGuess()" style="padding:10px 20px; background:var(--success); border:none; color:white; border-radius:5px; cursor:pointer;">SJEKK SVAR</button>
                <p id="feedback"></p>
            </div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let currentFunc = {};
        let score = 0;
        let isProcessing = false;

        function startGame(lvl) {
            currentLevel = lvl;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('levelDisplay').innerText = "Nivå " + lvl;
            generateNewFunction();
        }

        function generateNewFunction() {
            const n = Math.floor(Math.random() * 9) + 1;
            if (currentLevel === 1) {
                const op = Math.random() > 0.5 ? '+' : '-';
                currentFunc = { calc: (x) => op === '+' ? x + n : x - n, ans: `x${op}${n}` };
            } else if (currentLevel === 2) {
                const a = Math.floor(Math.random() * 4) + 2;
                currentFunc = { calc: (x) => a * x + n, ans: `${a}x+${n}` };
            } else {
                currentFunc = { calc: (x) => Math.pow(x, 2) + n, ans: `x^2+${n}` };
            }
            console.log("Svar: " + currentFunc.ans);
        }

        function runFactory(val) {
            if (isProcessing) return;
            isProcessing = true;
            
            const ball = document.getElementById('ball');
            const machine = document.getElementById('machine');
            
            machine.classList.add('working');
            ball.innerText = val;
            ball.style.transition = 'none';
            ball.style.left = '-60px';
            ball.style.opacity = '1';

            // Animasjonssekvens
            setTimeout(() => {
                ball.style.transition = '1s cubic-bezier(0.45, 0.05, 0.55, 0.95)';
                ball.style.left = '45%'; // Går inn i maskin
            }, 50);

            setTimeout(() => {
                const result = currentFunc.calc(val);
                ball.innerText = result;
                ball.style.left = '110%'; // Kommer ut
                addToLog(val, result);
            }, 1200);

            setTimeout(() => {
                ball.style.opacity = '0';
                machine.classList.remove('working');
                isProcessing = false;
            }, 2200);
        }

        function addToLog(x, y) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.style.padding = "5px";
            entry.style.borderBottom = "1px solid #444";
            entry.innerHTML = `<strong>${x}</strong> ➜ <span style="color:var(--accent)">${y}</span>`;
            log.insertBefore(entry, log.firstChild.nextSibling);
        }

        function checkGuess() {
            const guess = document.getElementById('guessInput').value.replace(/\s+/g, '').toLowerCase();
            const correct = currentFunc.ans.toLowerCase();
            const feedback = document.getElementById('feedback');

            if (guess === correct || guess === "f(x)=" + correct) {
                feedback.innerHTML = "🌟 RIKTIG! Fabrikken er omstilt.";
                score++;
                document.getElementById('score').innerText = "Riktige: " + score;
                setTimeout(() => {
                    document.getElementById('log').innerHTML = '<div style="font-size:0.8rem; border-bottom:1px solid #555; margin-bottom:10px;">HISTORIKK (X ➜ Y)</div>';
                    document.getElementById('guessInput').value = '';
                    feedback.innerText = '';
                    generateNewFunction();
                }, 2000);
            } else {
                feedback.innerText = "❌ Det stemmer ikke helt, prøv igjen!";
            }
        }
    </script>
</body>
</html>
