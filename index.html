<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funksjonsfabrikken 🏭</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f39c12;
            --success: #27ae60;
            --bg: #1a1a2e;
            --panel: #16213e;
            --text: #e9ecef;
            --key: #485460;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Startskjerm */
        #start-screen {
            text-align: center;
            background: var(--panel);
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--accent);
        }

        .level-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            font-size: 1.1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Spillskjerm */
        #game-screen {
            display: none;
            width: 95%;
            max-width: 1000px;
            background: var(--panel);
            padding: 20px;
            border-radius: 20px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 180px 1fr 220px;
            gap: 20px;
        }

        /* Tall-tastatur (venstre) */
        .keypad {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 15px;
            background: var(--key);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 3px #222;
        }

        .btn:active { box-shadow: none; transform: translateY(3px); }

        /* Fabrikk (midten) */
        .factory-box {
            height: 200px;
            background: #0f3460;
            border: 5px solid #555;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ball {
            width: 45px;
            height: 45px;
            background: var(--accent);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            left: -60px;
            font-weight: bold;
        }

        /* Matte-tastatur (bunn) */
        .math-keyboard {
            grid-column: span 3;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .input-display {
            background: #fff;
            color: #333;
            padding: 15px;
            font-size: 1.5rem;
            border-radius: 8px;
            margin-bottom: 15px;
            min-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .math-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .m-btn {
            padding: 10px 20px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .m-btn.special { background: var(--success); }
        .m-btn.clear { background: #c0392b; }

        .log {
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .working { animation: vibrate 0.1s infinite; }
        @keyframes vibrate { 0% { transform: translate(1px); } 100% { transform: translate(-1px); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>🏭 FUNKSJONS-FABRIKKEN</h1>
        <p>Velg nivå for å starte:</p>
        <button class="level-btn" onclick="startGame(1)">Nivå 1: Barn (+ / -)</button>
        <button class="level-btn" onclick="startGame(2)">Nivå 2: Ungdom (Blandet)</button>
        <button class="level-btn" onclick="startGame(3)">Nivå 3: VGS (x²)</button>
    </div>

    <div id="game-screen">
        <div class="main-grid">
            <div class="keypad">
                <div style="grid-column: span 2; text-align: center; font-size: 0.8rem; margin-bottom: 5px;">TEST ET TALL:</div>
                <button class="btn" onclick="runFactory(1)">1</button>
                <button class="btn" onclick="runFactory(2)">2</button>
                <button class="btn" onclick="runFactory(3)">3</button>
                <button class="btn" onclick="runFactory(4)">4</button>
                <button class="btn" onclick="runFactory(5)">5</button>
                <button class="btn" onclick="runFactory(0)">0</button>
            </div>

            <div class="factory-box" id="machine">
                <div class="ball" id="ball"></div>
                <div id="status">KLAR</div>
            </div>

            <div class="log" id="log">
                <div style="border-bottom: 1px solid #444; padding-bottom: 5px;">HISTORIKK</div>
            </div>

            <div class="math-keyboard">
                <div style="text-align: center; margin-bottom: 10px;">GJETT FUNKSJONEN:</div>
                <div class="input-display" id="guessDisplay">f(x) = </div>
                <div class="math-keys">
                    <button class="m-btn" onclick="addChar('x')">x</button>
                    <button class="m-btn" onclick="addChar('+')">+</button>
                    <button class="m-btn" onclick="addChar('-')">-</button>
                    <button class="m-btn" onclick="addChar('·')">·</button>
                    <button class="m-btn" onclick="addChar('^2')">x²</button>
                    <button class="m-btn" onclick="addChar('2')">2</button>
                    <button class="m-btn" onclick="addChar('3')">3</button>
                    <button class="m-btn" onclick="addChar('4')">4</button>
                    <button class="m-btn" onclick="addChar('5')">5</button>
                    <button class="m-btn clear" onclick="clearGuess()">Slett</button>
                    <button class="m-btn special" onclick="checkGuess()">SJEKK SVAR</button>
                </div>
                <p id="feedback" style="text-align: center; font-weight: bold; margin-top: 15px;"></p>
                <button onclick="showHint()" style="display:block; margin: 0 auto; background: none; border: none; color: #3498db; cursor: pointer;">Trenger du et hint?</button>
            </div>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let currentFunc = {};
        let isProcessing = false;
        let userGuess = "";

        function startGame(lvl) {
            currentLevel = lvl;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            generateNewFunction();
        }

        function generateNewFunction() {
            const n = Math.floor(Math.random() * 9) + 1;
            const a = Math.floor(Math.random() * 4) + 2;
            
            if (currentLevel === 1) {
                const op = Math.random() > 0.5 ? '+' : '-';
                currentFunc = { calc: (x) => op === '+' ? x + n : x - n, ans: `x${op}${n}`, hint: `Maskinen bruker ${op}` };
            } else if (currentLevel === 2) {
                const type = Math.floor(Math.random() * 2);
                if (type === 0) {
                    currentFunc = { calc: (x) => a * x, ans: `${a}x`, hint: "Ganging" };
                } else {
                    currentFunc = { calc: (x) => a * x + n, ans: `${a}x+${n}`, hint: "Ganging og pluss" };
                }
            } else {
                currentFunc = { calc: (x) => Math.pow(x, 2) + n, ans: `x^2+${n}`, hint: "Tallet opphøyes i 2." };
            }
            currentFunc.ans = currentFunc.ans.replace("+-", "-").replace("·", "");
            userGuess = "";
            updateDisplay();
        }

        function addChar(char) {
            userGuess += char;
            updateDisplay();
        }

        function clearGuess() {
            userGuess = "";
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('guessDisplay').innerText = "f(x) = " + userGuess;
        }

        function runFactory(val) {
            if (isProcessing) return;
            isProcessing = true;
            const ball = document.getElementById('ball');
            const machine = document.getElementById('machine');
            
            ball.innerText = val;
            ball.style.transition = 'none';
            ball.style.left = '-60px';
            ball.style.opacity = '1';
            machine.classList.add('working');

            setTimeout(() => {
                ball.style.transition = '1s ease-in-out';
                ball.style.left = '45%';
            }, 50);

            setTimeout(() => {
                const result = currentFunc.calc(val);
                ball.innerText = result;
                ball.style.left = '110%';
                addToLog(val, result);
                machine.classList.remove('working');
            }, 1100);

            setTimeout(() => {
                ball.style.opacity = '0';
                isProcessing = false;
            }, 2100);
        }

        function addToLog(x, y) {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.style.padding = "5px";
            entry.style.borderBottom = "1px solid #333";
            entry.innerHTML = `Inn: ${x} ➔ Ut: <span style="color:var(--accent)">${y}</span>`;
            log.insertBefore(entry, log.firstChild.nextSibling);
        }

        function checkGuess() {
            // Vi renser både gjetning og svar for å sammenligne (fjerner gagnetegn for enkelhets skyld)
            let processedGuess = userGuess.replace(/·/g, '').replace(/\^2/g, 'x2');
            let processedAns = currentFunc.ans.replace(/\^2/g, 'x2');
            const feedback = document.getElementById('feedback');

            if (processedGuess === processedAns) {
                feedback.innerHTML = "🎉 HELT RIKTIG! Ny fabrikk klargjøres...";
                setTimeout(() => {
                    document.getElementById('log').innerHTML = '<div style="border-bottom: 1px solid #444; padding-bottom: 5px;">HISTORIKK</div>';
                    feedback.innerText = '';
                    generateNewFunction();
                }, 2000);
            } else {
                feedback.innerHTML = "❌ Ikke helt riktig ennå. Prøv flere tall!";
            }
        }

        function showHint() {
            alert("Hint: " + currentFunc.hint);
        }
    </script>
</body>
</html>
