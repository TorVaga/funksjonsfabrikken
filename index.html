<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funksjonsfabrikken 🏭</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f39c12;
            --success: #27ae60;
            --bg: #1a1a2e;
            --panel: #16213e;
            --text: #e9ecef;
            --key: #485460;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            background: var(--panel);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Startskjerm */
        #start-screen { text-align: center; padding: 40px; }
        .level-btn {
            display: block; width: 100%; padding: 20px; margin: 10px 0;
            background: var(--accent); color: white; border: none;
            border-radius: 10px; font-size: 1.2rem; cursor: pointer;
        }

        /* Top Bar */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        /* Hoved-layout (Grid) */
        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 650px) {
            .game-grid { grid-template-columns: 1fr; }
        }

        /* Maskinen og Loggen */
        .machine-area {
            background: #0f3460;
            height: 180px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid #333;
        }

        .ball {
            width: 45px; height: 45px; background: var(--accent);
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; position: absolute; left: -60px; font-weight: bold;
        }

        .log-area {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            height: 180px;
            overflow-y: auto;
            font-family: monospace;
        }

        /* Tastatur-design */
        .keypad-label { font-size: 0.9rem; margin: 15px 0 8px; color: var(--accent); font-weight: bold; }
        
        .key-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .key {
            padding: 15px 5px; background: var(--key); color: white;
            border: none; border-radius: 6px; cursor: pointer; font-size: 1.1rem;
            box-shadow: 0 3px #222;
        }
        .key:active { transform: translateY(2px); box-shadow: none; }
        .key.op { background: #34495e; }
        .key.action { background: var(--success); grid-column: span 2; }
        .key.clear { background: #c0392b; }

        /* Svar-felt */
        .display-box {
            background: white; color: #222; padding: 15px;
            border-radius: 10px; font-size: 1.6rem; font-weight: bold;
            text-align: center; margin: 15px 0; min-height: 40px;
        }

        .working { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: rotate(1deg); } 100% { transform: rotate(-1deg); } }
    </style>
</head>
<body>

<div class="game-container">
    <div id="start-screen">
        <h1>🏭 Funksjonsfabrikken</h1>
        <p>Velg nivå for å starte:</p>
        <button class="level-btn" onclick="startGame(1)">Nivå 1: Barn (+ / -)</button>
        <button class="level-btn" onclick="startGame(2)">Nivå 2: Ungdom (Blandet)</button>
        <button class="level-btn" onclick="startGame(3)">Nivå 3: VGS (x²)</button>
    </div>

    <div id="game-screen" style="display:none;">
        <div class="header">
            <button onclick="location.reload()" style="background:none; border:1px solid #555; color:#888; cursor:pointer; padding:5px 10px; border-radius:5px;">Avbryt</button>
            <div id="lvl-tag">Nivå</div>
        </div>

        <div class="game-grid">
            <div class="machine-area" id="machine">
                <div class="ball" id="ball"></div>
                <div id="m-text" style="color:rgba(255,255,255,0.2); font-weight:bold; letter-spacing:5px;">FABRIKK</div>
            </div>
            <div class="log-area" id="log">
                <div style="font-size:0.7rem; color:#666; margin-bottom:10px;">HISTORIKK (x ➔ y)</div>
            </div>
        </div>

        <div class="keypad-label">TEST ET TALL (x):</div>
        <div class="key-grid">
            <button class="key" onclick="runFactory(1)">1</button>
            <button class="key" onclick="runFactory(2)">2</button>
            <button class="key" onclick="runFactory(3)">3</button>
            <button class="key" onclick="runFactory(4)">4</button>
            <button class="key" onclick="runFactory(5)">5</button>
            <button class="key" onclick="runFactory(6)">6</button>
            <button class="key" onclick="runFactory(7)">7</button>
            <button class="key" onclick="runFactory(8)">8</button>
            <button class="key" onclick="runFactory(9)">9</button>
            <button class="key" onclick="runFactory(0)">0</button>
        </div>

        <hr style="margin:25px 0; border:0; border-top:1px solid #333;">

        <div class="keypad-label">GJETT FUNKSJONEN:</div>
        <div class="display-box" id="guessDisplay">f(x) = </div>
        
        <div class="key-grid">
            <button class="key op" onclick="addChar('x')">x</button>
            <button class="key op" onclick="addChar('+')">+</button>
            <button class="key op" onclick="addChar('-')">-</button>
            <button class="key op" onclick="addChar('·')">·</button>
            <button class="key op" onclick="addChar('^2')">x²</button>
            
            <button class="key" onclick="addChar('1')">1</button>
            <button class="key" onclick="addChar('2')">2</button>
            <button class="key" onclick="addChar('3')">3</button>
            <button class="key" onclick="addChar('4')">4</button>
            <button class="key" onclick="addChar('5')">5</button>
            
            <button class="key" onclick="addChar('6')">6</button>
            <button class="key" onclick="addChar('7')">7</button>
            <button class="key" onclick="addChar('8')">8</button>
            <button class="key" onclick="addChar('9')">9</button>
            <button class="key" onclick="addChar('0')">0</button>
            
            <button class="key clear" onclick="clearGuess()">Slett</button>
            <button class="key action" onclick="checkGuess()">SJEKK SVAR</button>
            <button class="key op" onclick="showHint()">Hint</button>
        </div>
        <div id="feedback" style="text-align:center; margin-top:15px; font-weight:bold; min-height:20px;"></div>
    </div>
</div>

<script>
    let currentLevel = 1;
    let currentFunc = {};
    let isProcessing = false;
    let userGuess = "";

    function startGame(lvl) {
        currentLevel = lvl;
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        document.getElementById('lvl-tag').innerText = "Nivå " + lvl;
        generateNewFunction();
    }

    function generateNewFunction() {
        const n = Math.floor(Math.random() * 9) + 1;
        const a = Math.floor(Math.random() * 4) + 2;
        if (currentLevel === 1) {
            const op = Math.random() > 0.5 ? '+' : '-';
            currentFunc = { calc: (x) => op === '+' ? x + n : x - n, ans: `x${op}${n}`, hint: `Noe med ${op}` };
        } else if (currentLevel === 2) {
            const type = Math.floor(Math.random() * 2);
            currentFunc = (type === 0) ? 
                { calc: (x) => a * x, ans: `${a}x`, hint: "Multiplikasjon" } : 
                { calc: (x) => a * x + n, ans: `${a}x+${n}`, hint: "To operasjoner" };
        } else {
            currentFunc = { calc: (x) => Math.pow(x, 2) + n, ans: `x^2+${n}`, hint: "x i andre potens" };
        }
        currentFunc.ans = currentFunc.ans.replace("+-", "-");
        userGuess = "";
        updateDisplay();
    }

    function addChar(c) { userGuess += c; updateDisplay(); }
    function clearGuess() { userGuess = ""; updateDisplay(); }
    function updateDisplay() { document.getElementById('guessDisplay').innerText = "f(x) = " + userGuess; }
    function showHint() { alert("Hint: " + currentFunc.hint); }

    function runFactory(val) {
        if (isProcessing) return;
        isProcessing = true;
        const ball = document.getElementById('ball');
        const machine = document.getElementById('machine');
        ball.innerText = val;
        ball.style.transition = 'none'; ball.style.left = '-60px'; ball.style.opacity = '1';
        machine.classList.add('working');

        setTimeout(() => { ball.style.transition = '1s ease-in-out'; ball.style.left = '45%'; }, 50);
        setTimeout(() => {
            const res = currentFunc.calc(val);
            ball.innerText = res; ball.style.left = '110%';
            const entry = document.createElement('div');
            entry.innerHTML = `${val} ➔ <span style="color:var(--accent)">${res}</span>`;
            const log = document.getElementById('log');
            log.insertBefore(entry, log.firstChild.nextSibling);
            machine.classList.remove('working');
        }, 1100);
        setTimeout(() => { ball.style.opacity = '0'; isProcessing = false; }, 2100);
    }

    function checkGuess() {
        let guess = userGuess.replace(/·/g, '').replace(/\^2/g, 'x2');
        let ans = currentFunc.ans.replace(/\^2/g, 'x2');
        const fb = document.getElementById('feedback');
        if (guess === ans) {
            fb.innerHTML = "<span style='color:var(--success)'>🏆 RIKTIG! Ny maskin klargjøres...</span>";
            setTimeout(() => { 
                document.getElementById('log').innerHTML = '<div style="font-size:0.7rem; color:#666; margin-bottom:10px;">HISTORIKK</div>';
                fb.innerText = ''; generateNewFunction(); 
            }, 2000);
        } else {
            fb.innerHTML = "<span style='color:#e74c3c'>❌ Ikke helt riktig ennå!</span>";
        }
    }
</script>
</body>
</html>
