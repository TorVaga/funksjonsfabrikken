<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funksjonsfabrikken 🏭</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #f39c12;
            --success: #27ae60;
            --bg: #1a1a2e;
            --card: #16213e;
            --text: #e9ecef;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h1 { margin-top: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        /* Fabrikk-animasjon */
        .machine-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 40px 0;
            perspective: 1000px;
        }

        .pipe {
            width: 60px;
            height: 40px;
            background: #555;
            border-radius: 5px;
            position: relative;
        }

        .factory-box {
            width: 200px;
            height: 150px;
            background: linear-gradient(145deg, #2c3e50, #000);
            border: 4px solid #444;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 0 20px var(--accent);
            animation: vibrate 0.5s infinite alternate;
            animation-play-state: paused;
        }

        @keyframes vibrate {
            from { transform: translateY(0); }
            to { transform: translateY(-3px); }
        }

        .factory-box.working { animation-play-state: running; }

        .number-ball {
            width: 40px;
            height: 40px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            position: absolute;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
        }

        /* Kontroller */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .panel {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
        }

        select, input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover { background: #e67e22; transform: scale(1.02); }

        .log-container {
            margin-top: 30px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #444;
        }

        .log-entry {
            display: flex;
            justify-content: space-around;
            padding: 10px;
            border-bottom: 1px solid #333;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .feedback { min-height: 24px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏭 Funksjonsfabrikken</h1>
    
    <select id="levelSelect" onchange="resetGame()">
        <option value="1">Nivå 1: Barneskole (Enkel +/-)</option>
        <option value="2">Nivå 2: Ungdomsskole (ax + b)</option>
        <option value="3">Nivå 3: Videregående (Kvadratsetninger)</option>
    </select>

    <div class="machine-area">
        <div class="pipe"></div>
        <div class="factory-box" id="machine">
            <div id="ball" class="number-ball"></div>
            <span id="machineLabel">KLAR</span>
        </div>
        <div class="pipe"></div>
    </div>

    <div class="controls-grid">
        <div class="panel">
            <h3>Test et tall</h3>
            <input type="number" id="inputX" placeholder="Sett inn x...">
            <button onclick="animateProcess()">KJØR MASKIN</button>
        </div>
        <div class="panel">
            <h3>Hva er funksjonen?</h3>
            <input type="text" id="guessInput" placeholder="f.eks. x + 5">
            <button onclick="checkFormula()" style="background: var(--success);">SJEKK SVAR</button>
        </div>
    </div>

    <div id="feedback" class="feedback"></div>

    <div class="log-container" id="logContainer">
        <div class="log-entry"><strong>Inn (x)</strong> <strong>Ut (y)</strong></div>
    </div>

    <button onclick="resetGame()" style="margin-top: 30px; background: #555;">GENERER NY OPPGAVE</button>
</div>

<script>
    let currentFunction;
    const ball = document.getElementById('ball');
    const machine = document.getElementById('machine');

    function generateFunction() {
        const level = document.getElementById('levelSelect').value;
        const rand = Math.floor(Math.random() * 9) + 1;
        
        if (level == "1") {
            const op = Math.random() > 0.5 ? '+' : '-';
            return { apply: (x) => op === '+' ? x + rand : x - rand, answer: `x${op}${rand}` };
        } else if (level == "2") {
            const a = Math.floor(Math.random() * 4) + 2;
            return { apply: (x) => a * x + rand, answer: `${a}x+${rand}` };
        } else {
            return { apply: (x) => Math.pow(x, 2) + rand, answer: `x^2+${rand}` };
        }
    }

    async function animateProcess() {
        const x = parseFloat(document.getElementById('inputX').value);
        if (isNaN(x)) return;

        // Start animasjon
        ball.style.opacity = "1";
        ball.style.left = "-100px";
        ball.innerText = x;
        
        // Beveg inn i maskin
        setTimeout(() => {
            ball.style.left = "80px";
            machine.classList.add('working');
        }, 100);

        // Skjul i maskin og regn ut
        setTimeout(() => {
            const y = currentFunction.apply(x);
            ball.innerText = y;
            machine.classList.remove('working');
            
            // Beveg ut av maskin
            ball.style.left = "260px";
            addLog(x, y);
        }, 1200);

        // Reset ball
        setTimeout(() => {
            ball.style.opacity = "0";
            document.getElementById('inputX').value = '';
        }, 2000);
    }

    function addLog(x, y) {
        const log = document.getElementById('logContainer');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<span>${x}</span> <span>➜</span> <span>${y}</span>`;
        log.insertBefore(entry, log.firstChild.nextSibling);
    }

    function checkFormula() {
        const guess = document.getElementById('guessInput').value.replace(/\s+/g, '').toLowerCase();
        const correct = currentFunction.answer.toLowerCase();
        const feedback = document.getElementById('feedback');

        if (guess === correct || guess === `f(x)=${correct}`) {
            feedback.innerHTML = `<span style="color:var(--success)">🏆 FANTASTISK! f(x) = ${currentFunction.answer}</span>`;
        } else {
            feedback.innerHTML = `<span style="color:#e74c3c">Prøv igjen! Kanskje en annen operasjon?</span>`;
        }
    }

    function resetGame() {
        currentFunction = generateFunction();
        document.getElementById('logContainer').innerHTML = '<div class="log-entry"><strong>Inn (x)</strong> <strong>Ut (y)</strong></div>';
        document.getElementById('feedback').innerText = 'Ny funksjon klar!';
        document.getElementById('guessInput').value = '';
        console.log("Pssst! Svaret er: " + currentFunction.answer);
    }

    resetGame();
</script>

</body>
</html>
