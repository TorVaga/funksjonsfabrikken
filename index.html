<script>
    let currentLevel = 1;
    let currentFunc = {};
    let isProcessing = false;
    let userGuess = "";

    function startGame(lvl) {
        currentLevel = lvl;
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        document.getElementById('lvl-tag').innerText = "NIVÅ " + lvl;
        document.getElementById('powBtn').classList.toggle('hidden', lvl !== 3);
        generateNewFunction();
    }

    function generateNewFunction() {
        const n = Math.floor(Math.random() * 9) + 1;
        const a = Math.floor(Math.random() * 4) + 2;
        if (currentLevel === 1) {
            const op = Math.random() > 0.5 ? '+' : '-';
            currentFunc = { calc: (x) => op === '+' ? x + n : x - n, ans: `x${op}${n}`, hint: `Noe med ${op}` };
        } else if (currentLevel === 2) {
            const type = Math.floor(Math.random() * 2);
            currentFunc = (type === 0) ? 
                { calc: (x) => a * x, ans: `${a}x`, hint: "Ganging" } : 
                { calc: (x) => a * x + n, ans: `${a}x+${n}`, hint: "Ganging og pluss" };
        } else {
            currentFunc = { calc: (x) => Math.pow(x, 2) + n, ans: `x^2+${n}`, hint: "x i andre potens" };
        }
        currentFunc.ans = currentFunc.ans.replace("+-", "-");
        userGuess = "";
        updateDisplay();
    }

    function addChar(c) { userGuess += c; updateDisplay(); }
    function clearGuess() { userGuess = ""; updateDisplay(); }
    function updateDisplay() { document.getElementById('guessDisplay').innerText = "f(x) = " + userGuess; }
    function showHint() { alert("💡 Hint: " + currentFunc.hint); }

    function runFactory(val) {
        if (isProcessing) return;
        isProcessing = true;
        const ball = document.getElementById('ball');
        const machine = document.getElementById('machine');
        ball.innerText = val;
        ball.style.transition = 'none'; ball.style.left = '-60px'; ball.style.opacity = '1';
        machine.classList.add('working');

        setTimeout(() => { ball.style.transition = '0.8s ease-in-out'; ball.style.left = '42%'; }, 50);
        setTimeout(() => {
            const res = currentFunc.calc(val);
            ball.innerText = res; ball.style.left = '110%';
            const entry = document.createElement('div');
            entry.innerHTML = `<span style="color:#636e72">${val}</span> ➔ <span style="color:var(--accent)">${res}</span>`;
            const log = document.getElementById('log-content');
            log.insertBefore(entry, log.firstChild);
            machine.classList.remove('working');
        }, 900);
        setTimeout(() => { ball.style.opacity = '0'; isProcessing = false; }, 1800);
    }

    // NY OG FORBEDRET SJEKK-FUNKSJON
    function checkGuess() {
        const fb = document.getElementById('feedback');
        
        // Rens gjetning og svar for sammenligning
        let cleanGuess = userGuess.replace(/·/g, '').replace(/−/g, '-').replace(/\s+/g, '');
        let cleanAns = currentFunc.ans.replace(/·/g, '').replace(/-/g, '-').replace(/\s+/g, '');

        // 1. Direkte match (f.eks. 4x === 4x)
        if (cleanGuess === cleanAns) {
            success();
            return;
        }

        // 2. Sjekk for omvendt rekkefølge ved multiplikasjon (f.eks. x4 === 4x)
        // Vi sjekker om det bare er én variabel og ett tall uten pluss/minus
        if (currentLevel === 2 && !cleanAns.includes('+') && !cleanAns.includes('-')) {
            let reversedAns = cleanAns.split('').reverse().join('');
            if (cleanGuess === reversedAns) {
                success();
                return;
            }
        }
        
        // 3. Sjekk for x^2+n vs n+x^2 (Kommutativ lov for addisjon)
        if (cleanAns.includes('+')) {
            let parts = cleanAns.split('+');
            let reversedAns = parts[1] + '+' + parts[0];
            if (cleanGuess === reversedAns) {
                success();
                return;
            }
        }

        // Hvis ingen av de over stemmer:
        fb.innerHTML = "<span style='color:var(--danger)'>❌ Ikke helt rett, prøv igjen!</span>";

        function success() {
            fb.innerHTML = "<span style='color:var(--success)'>⭐ RIKTIG! Ny maskin...</span>";
            setTimeout(() => { 
                document.getElementById('log-content').innerHTML = '';
                fb.innerText = ''; 
                generateNewFunction(); 
            }, 1500);
        }
    }
</script>
